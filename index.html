<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake Phone Personalizável</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone" id="phone">

    <!-- BOTÃO INVISÍVEL -->
    <button id="hiddenEditorBtn" class="hidden-editor-btn" title="Abrir editor"></button>

    <!-- PAINEL -->
    <div class="editor-panel" id="editorPanel">
      <h3>Editor Status Bar</h3>

      <label>
        <input type="checkbox" id="toggleHora" checked>
        Hora
      </label>

      <label>
        <input type="checkbox" id="toggleSignal" checked>
        Sinal
      </label>

      <label>
        <input type="checkbox" id="toggleWifi" checked>
        Wi-Fi
      </label>

      <label>
        <input type="checkbox" id="toggleBattery" checked>
        Bateria
      </label>

      <label>
        <input type="checkbox" id="toggleIsland" checked>
        Barra preta
      </label>

      <label>
        <input type="checkbox" id="toggleDot" checked>
        Ponto vermelho
      </label>

      <label>
        <input type="checkbox" id="dragMode">
        Modo arrastar
      </label>

      <div class="range-group">
        <span>Velocidade</span>
        <input type="range" id="speedRange" min="1000" max="10000" step="500" value="4000">
        <small id="speedValue">4000 ms</small>
      </div>

      <div class="range-group">
        <span>Cor do sinal</span>
        <input type="color" id="signalColor" value="#ffffff">
      </div>

      <div class="range-group">
        <span>Cor do Wi-Fi</span>
        <input type="color" id="wifiColor" value="#ffffff">
      </div>

      <div class="range-group">
        <span>Cor da bateria</span>
        <input type="color" id="batteryColor" value="#ffffff">
      </div>

      <div class="position-box">
        <span>Posição exata</span>

        <div class="xy-row">
          <div>
            <label for="posX">X</label>
            <input type="number" id="posX" min="0" step="1" value="0">
          </div>

          <div>
            <label for="posY">Y</label>
            <input type="number" id="posY" min="0" step="1" value="0">
          </div>
        </div>

        <button id="applyPosition" type="button">Aplicar X/Y</button>
      </div>

      <div class="preset-box">
        <span>Presets</span>

        <input type="text" id="presetName" placeholder="Nome do preset">

        <div class="preset-actions">
          <button id="savePreset" type="button">Salvar preset</button>
          <button id="loadPreset" type="button">Carregar preset</button>
        </div>

        <select id="presetList" size="4"></select>

        <button id="deletePreset" type="button" class="secondary-btn">Excluir preset</button>
      </div>

      <div class="selected-item-box">
        <small id="selectedItemLabel">Item selecionado: nenhum</small>
      </div>

      <button id="resetPositions" type="button" class="secondary-btn">Resetar posições</button>
      <button id="closeEditor" type="button">Fechar</button>
    </div>

    <!-- STATUS BAR -->
    <div class="status-item draggable selectable" id="horaBox" data-name="Hora" style="left: 18px; top: 16px;">
      <span id="hora">09:41</span>
    </div>

    <div class="status-item draggable selectable island" id="islandBox" data-name="Barra preta" style="left: 118px; top: 12px;">
      <div class="recording-dot draggable selectable" id="recordingDot" data-name="Ponto vermelho"></div>
    </div>

    <div class="status-item draggable selectable" id="signalBox" data-name="Sinal" style="left: 275px; top: 18px;">
      <div class="signal">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="status-item draggable selectable" id="wifiBox" data-name="Wi-Fi" style="left: 298px; top: 18px;">
      <div class="wifi">
        <span class="wifi-arc arc-1"></span>
        <span class="wifi-arc arc-2"></span>
        <span class="wifi-dot"></span>
      </div>
    </div>

    <div class="status-item draggable selectable" id="batteryBox" data-name="Bateria" style="left: 320px; top: 18px;">
      <div class="battery">
        <div class="battery-level"></div>
      </div>
    </div>

    <!-- NOTIFICAÇÕES -->
    <div class="notifications" id="notifications"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
